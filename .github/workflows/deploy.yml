name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (frontend + Python engine + data)
        run: |
          mkdir -p _site/woofia_sim _site/data
          cp -r dashboard/* _site/
          cp woofia_sim/*.py _site/woofia_sim/
          cp sim_api.py _site/sim_api.py
          cp data/chars.json data/skills.json _site/data/
          rm -f _site/result.json
          VER="$(git log -1 --format=%cI)"
          printf '{"updated":"%s"}' "$VER" > _site/version.json
          # 실행 중인 코드가 자기 버전을 알도록 app.js에 빌드버전 주입 (stale 캐시 감지용)
          sed -i "s|__BUILD_VERSION__|$VER|" _site/app.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
