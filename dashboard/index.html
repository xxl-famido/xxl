<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XXL WOOFIA · 전투 시뮬레이터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glow"></div>

<div id="boot"><div class="boot-box">
  <span class="spin big"></span>
  <div class="boot-title">시뮬레이터 엔진 로딩 중…</div>
  <small id="bootMsg">시작하는 중…</small>
  <em>최초 1회만 (~10초), 이후엔 캐시되어 빨라요</em>
</div></div>

<header class="topbar">
  <div class="brand">
    <span class="logo-mark">XXL</span>
    <span class="logo-word">WOOFIA</span>
    <span class="logo-sub">전투 시뮬레이터</span>
  </div>
  <div class="topbar-hist">
    <label for="history">기록</label>
    <select id="history" title="지난 시뮬레이션 기록"><option value="">— 기록 없음 —</option></select>
    <button id="histManage" class="hist-clear" title="기록 관리 (선택 삭제)">⚙</button>
  </div>
  <div class="topbar-meta" id="topMeta">타겟 더미 · 결정론 시뮬</div>
</header>

<main class="wrap">

  <!-- ─── 팀 빌더 ─── -->
  <section class="panel build">
    <div class="panel-head"><h2>팀 편성</h2><p class="hint">로스터에서 캐릭터를 골라 슬롯에 배치 · 아이콘을 눌러 스펙/스킬 조정</p></div>

    <div class="team-slots" id="teamSlots"></div>

    <div class="roster-head"><h3>캐릭터 로스터</h3><div class="roster-filter" id="rosterFilter"></div></div>
    <div class="roster" id="roster"></div>
  </section>

  <!-- ─── 설정 ─── -->
  <aside class="panel settings">
    <div class="panel-head"><h2>전투 설정</h2>
      <button class="proc-btn" id="forceProc" title="모든 확률형 발동·버프(흑구백구 활성화, 50% 발동 등)를 100%로 강제">🎲 확률 100%</button>
    </div>
    <div class="proc-row"><button class="proc-btn" id="hp10Btn" title="더미 체력을 10%로 고정 (카라트 등 저HP 게이트 전부 발동)">❤️ 체력 10%</button></div>

    <label class="field" id="runsField"><span>반복 횟수 <em>(평균 — 많을수록 정확·느림)</em></span>
      <div class="row"><input type="range" id="runs" min="1" max="200" value="50"><b id="runsVal">50</b></div>
    </label>

    <label class="field"><span>진행 턴 수</span>
      <div class="row"><input type="range" id="turns" min="1" max="30" value="30"><b id="turnsVal">30</b></div>
    </label>
    <label class="field"><span>더미 속성 <em>(상성 ×1.5 / 역상성 ×0.75 / 무속성·무관 영향 없음)</em></span>
      <div class="seg" id="dummyElement" data-val="0">
        <button data-v="0" class="on">무</button><button data-v="1">불</button><button data-v="2">물</button><button data-v="3">풀</button><button data-v="4">빛</button><button data-v="5">어둠</button>
      </div>
    </label>
    <label class="field"><span>적 더미 수</span>
      <div class="seg" id="dummies" data-val="1">
        <button data-v="1" class="on">1</button><button data-v="2">2</button><button data-v="3">3</button><button data-v="4">4</button><button data-v="5">5</button>
      </div>
    </label>
    <label class="field"><span>적이 아군을 때리는 횟수 <em>(N=랜덤 N명 개별 타격 / 전체=아군 전체 1회 동시 피격)</em></span>
      <div class="seg" id="enemyHits" data-val="5">
        <button data-v="0">0</button><button data-v="1">1</button><button data-v="2">2</button><button data-v="3">3</button><button data-v="4">4</button><button data-v="5" class="on">5</button><button data-v="all">전체</button>
      </div>
    </label>

    <div class="field">
      <span>행동 우선순위 <em>(드래그로 순서 변경)</em></span>
      <ol class="prio" id="prio"></ol>
      <div class="prio-turn">
        <span class="pt-label">특정 턴만 다르게 <em>(턴 여러 개 토글 선택 → 한 번에 순서 편집)</em></span>
        <div class="turn-chips" id="turnChips"></div>
        <div id="turnEditor"></div>
      </div>
      <button class="btn-ghost sm" id="prioReset">전부 기본값으로</button>
    </div>

    <button class="btn-run" id="runBtn"><span>시뮬레이션 실행</span></button>
  </aside>

  <!-- ─── 결과 ─── -->
  <section class="panel results" id="results" hidden>
    <div class="hero-stats">
      <div class="hero-num"><label>총 데미지 <em>중앙값</em></label><b id="hTotal">—</b><span class="hero-range" id="hTotalRange"></span></div>
      <div class="hero-num"><label>DPS / 턴 <em>중앙값</em></label><b id="hDps">—</b><span class="hero-range" id="hDpsRange"></span></div>
      <div class="hero-num"><label>턴</label><b id="hTurns">—</b></div>
    </div>

    <div class="rank" id="rank"></div>

    <div class="chart-card">
      <div class="panel-head sm"><h3>턴별 데미지</h3></div>
      <div class="chart" id="chart"></div>
    </div>

    <div class="log-card">
      <div class="panel-head sm"><h3>상세 전투 로그</h3><p class="hint" id="logOrder"></p></div>
      <div class="log" id="log"></div>
    </div>
  </section>

</main>

<!-- ─── 캐릭터 상세 모달 ─── -->
<div class="modal" id="modal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-card" id="modalCard"></div>
</div>

<!-- ─── 기록 관리 모달 ─── -->
<div class="modal" id="histModal" hidden>
  <div class="modal-bg" data-hclose></div>
  <div class="hist-card">
    <div class="hist-head"><h3>기록 관리</h3><button class="mc-close" data-hclose>×</button></div>
    <div class="hist-tools">
      <button id="hAll" class="btn-ghost sm">모두 선택</button>
      <button id="hNone" class="btn-ghost sm">모두 해제</button>
      <span class="hsel-count" id="hselCount">0개 선택</span>
    </div>
    <div class="hist-list" id="histList"></div>
    <div class="hist-actions">
      <button id="hDelSel" class="btn-danger">선택 삭제</button>
      <button id="hDelOther" class="btn-danger ghost">선택 제외 삭제</button>
    </div>
  </div>
</div>

<div class="last-update" id="lastUpdate"></div>

<script src="app.js"></script>
</body>
</html>
